services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}-nginx
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    environment:
      NGINX_WEB_ROOT: ${NGINX_WEB_ROOT:-/var/www/html}
    volumes:
      - ${APP_PATH}:/var/www/html:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network
    restart: always

  # PHP 8.3 FPM Service
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: ${APP_NAME}-php
    environment:
      - TZ=${SYSTEM_TIMEZONE}
    volumes:
      - ${APP_PATH}:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - app-network
    restart: always

  # MariaDB Database Service
  mariadb:
    image: mariadb:latest
    container_name: ${APP_NAME}-database
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${SYSTEM_TIMEZONE}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - db_data:/var/lib/mysql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - app-network
    restart: always

  # Certbot SSL Renewal Service
  certbot:
    image: certbot/certbot:latest
    container_name: ${APP_NAME}-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network
    restart: always

  # PostgreSQL Database Service (Optional)

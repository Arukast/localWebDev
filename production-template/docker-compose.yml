services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ${APP_PATH}:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
    networks:
      - app-network
    restart: always

  # PHP 8.3 FPM Service
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: ${APP_NAME}-php
    environment:
      - TZ=${SYSTEM_TIMEZONE}
    volumes:
      - ${APP_PATH}:/var/www/html
    networks:
      - app-network
    restart: always

  # MariaDB Database Service
  mariadb:
    image: mariadb:latest
    container_name: ${APP_NAME}-database
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${SYSTEM_TIMEZONE}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  # PostgreSQL Database Service
  # postgres:
  #   image: postgres:latest
  #   container_name: ${APP_NAME}-database
  #   ports:
  #     - "127.0.0.1:5433:5432"
  #   environment:
  #     POSTGRES_DB: ${DB_NAME}
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     TZ: ${SYSTEM_TIMEZONE}
  #   volumes:
  #     - pg_data:/var/lib/postgresql
  #   networks:
  #     - app-network
  #   restart: always

  # # phpMyAdmin Web UI for MariaDB
  # phpmyadmin:
  #   image: phpmyadmin:latest
  #   container_name: ${APP_NAME}-phpmyadmin
  #   ports:
  #     - "127.0.0.1:${PHPMYADMIN_PORT}:80"
  #   environment:
  #     PMA_HOST: ${APP_NAME}-database
  #     PMA_PORT: 3306 # Internal Docker communication remains 3306
  #     PMA_ARBITRARY: 1
  #   depends_on:
  #     - mariadb
  #   networks:
  #     - app-network
  #   restart: always

  # # pgAdmin Web UI for PostgreSQL
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: ${APP_NAME}-pgadmin
  #   ports:
  #     - "127.0.0.1:${PGADMIN_PORT}:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

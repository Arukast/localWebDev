  app-network:
    name: ${APP_NAME}-network
    driver: bridge

volumes:
  db_data:
    name: ${APP_NAME}-db-data
  certbot_data:
    name: ${APP_NAME}-certbot-data
  certbot_www:
    name: ${APP_NAME}-certbot-www

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html index.htm;

    charset utf-8;

    # Optimize request body limits
    client_max_body_size 50M;

    # Production Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Disable logging for static assets to reduce disk writes
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|woff|woff2|ttf|svg)$ {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    # Pass PHP scripts to PHP-FPM container
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block access to sensitive system files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}


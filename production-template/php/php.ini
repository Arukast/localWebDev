[PHP]
memory_limit = 256M
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 60

# Production Security overrides
display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off
session.cookie_httponly = 1
session.use_strict_mode = 1

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000

# Set validate_timestamps = 0 for maximum production performance (requires container restart on code deploy).
# Set to 1 with revalidate_freq = 2 if live files are updated without container restart.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1


services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: local-nginx
    ports:
      - "${NGINX_PORT_HTTP}:80"
      - "${NGINX_PORT_PHP82}:8082"
      - "${NGINX_PORT_PHP83}:8083"
    volumes:
      - ${PROJECTS_PATH}:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php82
      - php83
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.2 FPM Service
  php82:
    build:
      context: ./php82
      dockerfile: Dockerfile
    container_name: local-php82
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.3 FPM Service
  php83:
    build:
      context: ./php83
      dockerfile: Dockerfile
    container_name: local-php83
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    networks:
      - local-network
    restart: unless-stopped

  # MariaDB (MySQL replacement) Service
  mariadb:
    image: mariadb:latest
    container_name: local-mariadb
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MARIADB_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - local-network
    restart: unless-stopped

  # PostgreSQL Service
  postgres:
    image: postgres:latest
    container_name: local-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - local-network
    restart: unless-stopped

  # phpMyAdmin (Web administration tool for MariaDB)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: local-phpmyadmin
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - mariadb
    networks:
      - local-network
    restart: unless-stopped

  # pgAdmin (Web administration tool for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: local-pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - local-network
    restart: unless-stopped

networks:
  local-network:
    name: local-dev-network
    driver: bridge

volumes:
  mariadb_data:
    name: local-mariadb-data
  postgres_data:
    name: local-postgres-data
  pgadmin_data:
    name: local-pgadmin-data

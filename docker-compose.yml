services:
  # Dnsmasq (Local DNS resolver for *.test domains)
  dnsmasq:
    build:
      context: ./dnsmasq
      dockerfile: Dockerfile
    container_name: local-dnsmasq
    ports:
      - "127.0.0.1:${DNSMASQ_PORT:-5354}:53/udp"
      - "127.0.0.1:${DNSMASQ_PORT:-5354}:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w1 127.0.0.1 53 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${DNSMASQ_MEM_LIMIT:-64m}
    networks:
      - local-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: local-nginx
    ports:
      - "${NGINX_PORT_HTTP:-80}:80"
      - "${NGINX_PORT_HTTPS:-443}:443"
      - "${NGINX_PORT_PHP82:-8082}:8082"
      - "${NGINX_PORT_PHP83:-8083}:8083"
      - "${NGINX_PORT_PHP84:-8084}:8084"
      - "${NGINX_PORT_PHP85:-8085}:8085"
    environment:
      - TAILSCALE_DOMAIN=${TAILSCALE_DOMAIN}
      - TAILSCALE_PROJECT_PATH=${TAILSCALE_PROJECT_PATH}
      - NGINX_ENVSUBST_VARIABLES=\$TAILSCALE_DOMAIN \$TAILSCALE_PROJECT_PATH
    volumes:
      - ${PROJECTS_PATH}:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${NGINX_MEM_LIMIT:-256m}
    depends_on:
      php82:
        condition: service_healthy
      php83:
        condition: service_healthy
      php84:
        condition: service_healthy
      php85:
        condition: service_healthy
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.2 FPM Service
  php82:
    build:
      context: ./php82
      dockerfile: Dockerfile
    container_name: local-php82
    environment:
      - TZ=${SYSTEM_TIMEZONE:-UTC}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PHP82_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.3 FPM Service
  php83:
    build:
      context: ./php83
      dockerfile: Dockerfile
    container_name: local-php83
    environment:
      - TZ=${SYSTEM_TIMEZONE:-UTC}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PHP83_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.4 FPM Service
  php84:
    build:
      context: ./php84
      dockerfile: Dockerfile
    container_name: local-php84
    environment:
      - TZ=${SYSTEM_TIMEZONE:-UTC}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PHP84_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped

  # PHP 8.5 FPM Service (Experimental / Nightly)
  php85:
    build:
      context: ./php85
      dockerfile: Dockerfile
    container_name: local-php85
    environment:
      - TZ=${SYSTEM_TIMEZONE:-UTC}
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
    volumes:
      - ${PROJECTS_PATH}:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PHP85_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped

  # MariaDB (MySQL replacement) Service
  mariadb:
    image: mariadb:latest
    container_name: local-mariadb
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MARIADB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-local_db}
      MYSQL_USER: ${MARIADB_USER:-db_user}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:-db_password}
      TZ: ${SYSTEM_TIMEZONE:-UTC}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${MARIADB_MEM_LIMIT:-1g}
    networks:
      - local-network
    restart: unless-stopped

  # PostgreSQL Service
  postgres:
    image: postgres:latest
    container_name: local-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-local_db}
      POSTGRES_USER: ${POSTGRES_USER:-db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-db_password}
      TZ: ${SYSTEM_TIMEZONE:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-db_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-1g}
    networks:
      - local-network
    restart: unless-stopped

  # Redis Service
  redis:
    image: redis:alpine
    container_name: local-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256m}
    networks:
      - local-network
    restart: unless-stopped

  # Mailpit (Web UI & SMTP tool for Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: local-mailpit
    ports:
      - "127.0.0.1:${MAILPIT_PORT_UI:-8025}:8025"
      - "127.0.0.1:${MAILPIT_PORT_SMTP:-1025}:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${MAILPIT_MEM_LIMIT:-128m}
    networks:
      - local-network
    restart: unless-stopped

  # Redis Commander (Web UI for Redis)
  redis-commander:
    profiles: ["tools"]
    image: rediscommander/redis-commander:latest
    container_name: local-redis-commander
    ports:
      - "127.0.0.1:${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${REDIS_COMMANDER_MEM_LIMIT:-128m}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - local-network
    restart: unless-stopped

  # phpMyAdmin (Web administration tool for MariaDB)
  phpmyadmin:
    profiles: ["tools"]
    image: phpmyadmin:latest
    container_name: local-phpmyadmin
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/ || wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PHPMYADMIN_MEM_LIMIT:-256m}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - local-network
    restart: unless-stopped

  # pgAdmin (Web administration tool for PostgreSQL)
  pgadmin:
    profiles: ["tools"]
    image: dpage/pgadmin4:latest
    container_name: local-pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localdev.test}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${PGADMIN_MEM_LIMIT:-256m}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - local-network
    restart: unless-stopped

  # Meilisearch (Search Engine Service)
  meilisearch:
    profiles: ["tools"]
    image: getmeili/meilisearch:latest
    container_name: local-meilisearch
    ports:
      - "127.0.0.1:${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-masterKey}
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${MEILISEARCH_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped

  # MinIO (S3-Compatible Object Storage)
  minio:
    profiles: ["tools"]
    image: minio/minio:latest
    container_name: local-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM_LIMIT:-512m}
    networks:
      - local-network
    restart: unless-stopped



networks:
  local-network:
    name: local-dev-network
    driver: bridge

volumes:
  mariadb_data:
    name: local-mariadb-data
  postgres_data:
    name: local-postgres-data
  redis_data:
    name: local-redis-data
  pgadmin_data:
    name: local-pgadmin-data
  meilisearch_data:
    name: local-meilisearch-data
  minio_data:
    name: local-minio-data

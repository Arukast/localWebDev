name: CI / Quality Assurance

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore_paths: 'production-template'

  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Validate Docker Compose File
        run: docker compose config -q

  unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make Scripts Executable
        run: chmod +x dev tests/*.sh

      - name: Run Unit Tests
        run: ./dev test unit

  integration-tests:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, docker-validate, unit-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Make Scripts Executable
        run: chmod +x dev tests/*.sh

      - name: Run Integration Tests
        run: ./dev test integration
